name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Get version
        id: version
        run: |
          RUN=${{ github.run_number }}
          COUNTER=$(( RUN - 22 ))
          MAJOR=$(( (10 + COUNTER) / 10 ))
          MINOR=$(( (10 + COUNTER) % 10 ))
          echo "versionCode=${MAJOR}${MINOR}" >> $GITHUB_OUTPUT
          echo "versionName=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "tag=v${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "ver=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: ./gradlew assembleDebug -PversionCode=${{ steps.version.outputs.versionCode }} -PversionName=${{ steps.version.outputs.versionName }}

      - name: Build Release APK
        continue-on-error: true
        run: ./gradlew assembleRelease -PversionCode=${{ steps.version.outputs.versionCode }} -PversionName=${{ steps.version.outputs.versionName }}

      - name: Rename APK files
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/SafeBaiyun-${{ steps.version.outputs.ver }}.apk"
          mv app/build/outputs/apk/release/app-release-unsigned.apk "app/build/outputs/apk/release/SafeBaiyun-${{ steps.version.outputs.ver }}-unsigned.apk"

      - name: Create Release & Upload APKs
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
