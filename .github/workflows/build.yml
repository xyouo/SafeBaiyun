name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Get version
        id: version
        run: |
          TIMESTAMP=$(date -u +%s)
          echo "versionCode=${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "versionName=2.0-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "ver=2.0-${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: ./gradlew assembleDebug -PversionCode=${{ steps.version.outputs.versionCode }} -PversionName=${{ steps.version.outputs.versionName }}

      - name: Rename APK files
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/SafeBaiyun-${{ steps.version.outputs.ver }}.apk"

      - name: Upload APK to v2.0 release
        run: |
          gh release upload v2.0 app/build/outputs/apk/debug/SafeBaiyun-${{ steps.version.outputs.ver }}.apk -R ${{ github.repository }} 2>/dev/null || \
          gh release create v2.0 app/build/outputs/apk/debug/SafeBaiyun-${{ steps.version.outputs.ver }}.apk -R ${{ github.repository }} --title "v2.0" --notes "SafeBaiyun ${{ steps.version.outputs.ver }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Keep latest APK asset
        run: |
          gh release view v2.0 -R ${{ github.repository }} --json assets \
            --jq '.assets | map(select(.name | test("^SafeBaiyun-2\\.0-[0-9]+\\.apk$"))) | sort_by(.createdAt) | reverse | .[1:] | .[].name' \
            | while read -r asset; do
                [ -n "$asset" ] && gh release delete-asset v2.0 "$asset" -R ${{ github.repository }} -y
              done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

