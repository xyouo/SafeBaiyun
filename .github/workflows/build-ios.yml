name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [ ios ]
    paths:
      - ".github/workflows/build-ios.yml"
      - "SafeBaiyun-iOS/**"

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      RELEASE_REF: 51485c160745f032e59b1d82421a349621dc0d9f

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Get version
        id: version
        run: echo "ver=2.0-$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Prepare Release source
        run: |
          git worktree add release-source "$RELEASE_REF"
          xcodegen generate --spec release-source/SafeBaiyun-iOS/project.yml

      - name: Generate Debug project
        run: xcodegen generate --spec SafeBaiyun-iOS/project.yml

      - name: Build Release app
        run: |
          xcodebuild \
            -project release-source/SafeBaiyun-iOS/SafeBaiyun.xcodeproj \
            -scheme SafeBaiyun \
            -sdk iphoneos \
            -configuration Release \
            CONFIGURATION_BUILD_DIR="$PWD/build/ios" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Debug app
        run: |
          xcodebuild \
            -project SafeBaiyun-iOS/SafeBaiyun.xcodeproj \
            -scheme SafeBaiyun \
            -sdk iphoneos \
            -configuration Debug \
            CONFIGURATION_BUILD_DIR="$PWD/build/ios-debug" \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        id: ipa
        run: |
          app_path="build/ios/SafeBaiyun.app"
          debug_app_path="build/ios-debug/SafeBaiyun.app"
          ipa_name="SafeBaiyun-${{ steps.version.outputs.ver }}.ipa"
          debug_ipa_name="SafeBaiyun-${{ steps.version.outputs.ver }}-debug.ipa"
          test -d "$app_path"
          test -d "$debug_app_path"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$app_path" Payload/
          zip -qry "$ipa_name" Payload
          rm -rf Payload
          mkdir -p Payload
          cp -R "$debug_app_path" Payload/
          zip -qry "$debug_ipa_name" Payload
          echo "path=$ipa_name" >> "$GITHUB_OUTPUT"
          echo "debug_path=$debug_ipa_name" >> "$GITHUB_OUTPUT"

      - name: Upload IPA to v2.0 release
        run: |
          gh release view v2.0 -R "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create v2.0 -R "${{ github.repository }}" --title "v2.0" --notes "SafeBaiyun v2.0"
          gh release upload v2.0 "${{ steps.ipa.outputs.path }}" -R "${{ github.repository }}" --clobber
          gh release upload v2.0 "${{ steps.ipa.outputs.debug_path }}" -R "${{ github.repository }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep latest IPA assets
        run: |
          gh release view v2.0 -R "${{ github.repository }}" --json assets \
            --jq '.assets | map(select(.name | test("^SafeBaiyun-iOS-.*\\.ipa$"))) | .[].name' \
            | while read -r asset; do
                [ -n "$asset" ] && gh release delete-asset v2.0 "$asset" -R "${{ github.repository }}" -y
              done
          gh release view v2.0 -R "${{ github.repository }}" --json assets \
            --jq '.assets | map(select(.name | test("^SafeBaiyun-2\\.0-[0-9]+\\.ipa$"))) | sort_by(.createdAt) | reverse | .[1:] | .[].name' \
            | while read -r asset; do
                [ -n "$asset" ] && gh release delete-asset v2.0 "$asset" -R "${{ github.repository }}" -y
              done
          gh release view v2.0 -R "${{ github.repository }}" --json assets \
            --jq '.assets | map(select(.name | test("^SafeBaiyun-2\\.0-[0-9]+-debug\\.ipa$"))) | sort_by(.createdAt) | reverse | .[1:] | .[].name' \
            | while read -r asset; do
                [ -n "$asset" ] && gh release delete-asset v2.0 "$asset" -R "${{ github.repository }}" -y
              done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
