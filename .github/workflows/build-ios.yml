name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [ ios ]
    paths:
      - ".github/workflows/build-ios.yml"
      - "SafeBaiyun-iOS/**"

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Get version
        id: version
        run: |
          timestamp="$(date -u +%s)"
          echo "ver=3.0.$timestamp" >> "$GITHUB_OUTPUT"
          echo "build=$timestamp" >> "$GITHUB_OUTPUT"

      - name: Generate project
        run: xcodegen generate --spec SafeBaiyun-iOS/project.yml

      - name: Set bundle versions
        run: |
          plist="SafeBaiyun-iOS/SafeBaiyun/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.ver }}" "$plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.version.outputs.build }}" "$plist"

      - name: Build Release app
        run: |
          xcodebuild \
            -project SafeBaiyun-iOS/SafeBaiyun.xcodeproj \
            -scheme SafeBaiyun \
            -sdk iphoneos \
            -configuration Release \
            CONFIGURATION_BUILD_DIR="$PWD/build/ios" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Debug app
        run: |
          xcodebuild \
            -project SafeBaiyun-iOS/SafeBaiyun.xcodeproj \
            -scheme SafeBaiyun \
            -sdk iphoneos \
            -configuration Debug \
            CONFIGURATION_BUILD_DIR="$PWD/build/ios-debug" \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        id: ipa
        run: |
          app_path="build/ios/SafeBaiyun.app"
          debug_app_path="build/ios-debug/SafeBaiyun.app"
          ipa_name="SafeBaiyun-${{ steps.version.outputs.ver }}.ipa"
          debug_ipa_name="SafeBaiyun-${{ steps.version.outputs.ver }}-debug.ipa"
          test -d "$app_path"
          test -d "$debug_app_path"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$app_path" Payload/
          zip -qry "$ipa_name" Payload
          rm -rf Payload
          mkdir -p Payload
          cp -R "$debug_app_path" Payload/
          zip -qry "$debug_ipa_name" Payload
          echo "path=$ipa_name" >> "$GITHUB_OUTPUT"
          echo "debug_path=$debug_ipa_name" >> "$GITHUB_OUTPUT"

      - name: Upload IPA to v3.0 release
        run: |
          gh release view v3.0 -R "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create v3.0 -R "${{ github.repository }}" --title "v3.0" --notes "SafeBaiyun v3.0"
          gh release upload v3.0 "${{ steps.ipa.outputs.path }}" -R "${{ github.repository }}" --clobber
          gh release upload v3.0 "${{ steps.ipa.outputs.debug_path }}" -R "${{ github.repository }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

